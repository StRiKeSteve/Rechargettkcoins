<!DOCTYPE html>
<html>
<head>

<title>COIN RECHARGE</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
font-weight:bold;
}

/* TOP BAR */
.topbar{
background:white;
padding:15px 25px;
font-size:24px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
display:flex;
align-items:center;
gap:10px;
}

.logo{
height:40px;
}

/* MAIN */
.container{
max-width:1000px;
margin:auto;
padding:30px;
}

/* INPUT + TIKTOK */
.input-box{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.tiktok-logo{
height:30px;
}

input{
padding:10px;
font-weight:bold;
}

/* PROFILE */
.profile{
background:#eee;
padding:20px;
border-radius:10px;
display:flex;
align-items:center;
gap:15px;
width:350px;
margin-top:15px;
}

.avatar{
width:55px;
height:55px;
border-radius:50%;
background:#6c4cff;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
}

/* BALANCE */
.balance-box{
display:flex;
align-items:center;
gap:8px;
}

.balance-icon{
width:25px;
height:25px;
}

/* COINS */
.coins{
margin-top:30px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
cursor:pointer;
border:2px solid transparent;
font-size:18px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
transition:0.3s;
}

.card:hover{
border-color:red;
transform:scale(1.05);
}

.coin-img{
width:70px;
height:70px;
margin-bottom:10px;
}

/* HISTORY */
.history{
margin-top:40px;
background:white;
padding:20px;
border-radius:10px;
}

/* POPUPS */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:350px;
text-align:center;
}

button{
padding:12px 18px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
font-weight:bold;
}

.pay{
background:#00d2c9;
}

.close{
background:red;
color:white;
}

/* RECEIPT STYLE */
#receiptPopup .box{
text-align:left;
}

</style>

</head>

<body>

<!-- TOP -->
<div class="topbar">
<img src="logo.png" class="logo">
<span>GET COINS</span>
</div>

<div class="container">

<!-- INPUT + TIKTOK -->
<div class="input-box">
<img src="tiktok.png" class="tiktok-logo">
<input id="username" placeholder="ENTER USERNAME" oninput="updateProfile()">
</div>

<!-- PROFILE -->
<div class="profile">
<div class="avatar" id="avatar">?</div>

<div>
<div id="name">UNKNOWN USER</div>

<div class="balance-box">
<img src="coin.png" class="balance-icon">
<span id="balance">8697790326777</span>
</div>

</div>
</div>

<h2>RECHARGE COINS</h2>

<!-- COINS -->
<div class="coins">

<div class="card" onclick="openPay(30,0.99)">
<img src="coin.png" class="coin-img">
30<br>$0.99
</div>

<div class="card" onclick="openPay(350,4.99)">
<img src="coin.png" class="coin-img">
350<br>$4.99
</div>

<div class="card" onclick="openPay(700,9.99)">
<img src="coin.png" class="coin-img">
700<br>$9.99
</div>

<div class="card" onclick="openPay(1400,19.99)">
<img src="coin.png" class="coin-img">
1400<br>$19.99
</div>

<div class="card" onclick="openPay(3500,49.99)">
<img src="coin.png" class="coin-img">
3500<br>$49.99
</div>

<div class="card" onclick="openPay(7000,99.99)">
<img src="coin.png" class="coin-img">
7000<br>$99.99
</div>

<div class="card" onclick="openPay(17500,199.99)">
<img src="coin.png" class="coin-img">
17500<br>$199.99
</div>

</div>

<!-- HISTORY -->
<div class="history">
<h3>TRANSACTION HISTORY</h3>
<ul id="historyList"></ul>
</div>

</div>

<!-- PAYMENT POPUP -->
<div class="popup" id="popup">
<div class="box">

<div id="payText"></div>
<br>
<div id="reference"></div>
<br>

<button class="pay" onclick="confirmPay()">PAY NOW</button>
<br>
<button class="close" onclick="closePopup()">CANCEL</button>

</div>
</div>

<!-- RECEIPT POPUP -->
<div class="popup" id="receiptPopup">
<div class="box">

<h2>Payment Receipt</h2>

<p><b>Method:</b> PayPal</p>
<p><b>Status:</b> Completed</p>

<p id="receiptCoins"></p>
<p id="receiptAmount"></p>

<hr>

<p><b>PayPal Balance:</b> $748,880,235</p>

<br>

<button class="pay" onclick="closeReceipt()">OK</button>

</div>
</div>

<script>

let selectedCoins=0
let price=0

function updateProfile(){
let username=document.getElementById("username").value
if(username.length>0){
document.getElementById("avatar").innerText=username[0].toUpperCase()
document.getElementById("name").innerText=username.toUpperCase()
}
}

function generateRef(){
return "REF"+Math.floor(Math.random()*1000000000)
}

function openPay(coins,cost){
selectedCoins=coins
price=cost

document.getElementById("popup").style.display="flex"

document.getElementById("payText").innerText=
"CONFIRM PURCHASE: "+coins+" FOR $"+cost

document.getElementById("reference").innerText=
"REFERENCE CODE: "+generateRef()
}

function closePopup(){
document.getElementById("popup").style.display="none"
}

function confirmPay(){

let balance=document.getElementById("balance")
let newBalance=parseInt(balance.innerText)+selectedCoins
balance.innerText=newBalance

let item=document.createElement("li")
item.innerText="Recharge: "+selectedCoins+" - SUCCESS"
document.getElementById("historyList").appendChild(item)

closePopup()

document.getElementById("receiptPopup").style.display="flex"

document.getElementById("receiptCoins").innerText=
"Coins Purchased: "+selectedCoins

document.getElementById("receiptAmount").innerText=
"Amount Paid: $"+price
}

function closeReceipt(){
document.getElementById("receiptPopup").style.display="none"
}

</script>

</body>
</html>
